services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: etnicos-app:latest
    restart: unless-stopped
    volumes:
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - etnicos
      - default
    external_links:
      - mariadb:mysql

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8083}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-storage:/var/www/html/storage:ro
      - app-public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - etnicos
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - etnicos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  queue:
    image: etnicos-app:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - etnicos
      - default
    external_links:
      - mariadb:mysql

  scheduler:
    image: etnicos-app:latest
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - etnicos
      - default
    external_links:
      - mariadb:mysql

networks:
  etnicos:
    driver: bridge
  default:
    external: true
    name: geekcorp_webnet

volumes:
  redis-data:
  app-storage:
  app-public:
  app-bootstrap-cache:
